<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1164 1163" shape-rendering="geometricPrecision">
  <style>
    .logo-path {
      /* Initial state: Transparent fill, visible white outline */
      fill: rgba(255, 255, 255, 0);
      stroke: white;
      
      /* Thickened the border */
      stroke-width: 15;
      
      /* Keeps thick corners from spiking AND perfectly seals the start/end gap */
      stroke-linejoin: round; 
      stroke-linecap: round;
      
      /* Increased to 3800 to ensure the line is long enough to fully close */
      stroke-dasharray: 3800;
      stroke-dashoffset: 3800;
      
      /* Infinite to and fro motion */
      animation: continuousDraw 4s ease-in-out infinite alternate;
    }

    /* Defines the complete cycle: Draw, Fill, then pause */
    @keyframes continuousDraw {
      0% { 
        stroke-dashoffset: 3800; 
        fill: rgba(255, 255, 255, 0); 
        stroke-width: 15;
      }
      
      /* Step 1: Finish drawing the thick outline completely */
      75% { 
        stroke-dashoffset: 0; 
        fill: rgba(255, 255, 255, 0); 
        stroke-width: 15;
      }
      
      /* Step 2: Fill the shape and shrink the border to 0 */
      90%, 100% { 
        stroke-dashoffset: 0; 
        fill: rgba(255, 255, 255, 1);
        stroke-width: 0;
      }
    }
  </style>

  <path class="logo-path" d="M 190.6 490.5
           L 190.6 868.8
           L 240.2 868.8
           L 382.2 726.8
           L 331.8 726.8
           L 331.8 546.4
           L 357.0 524.5
           L 536.9 709.9
           L 699.1 550.3
           L 765.7 726.8
           L 693.7 726.8
           L 831.7 868.8
           L 970.6 868.8
           L 751.5 295.0
           L 536.9 508.4
           L 357.0 329.8
           Z" />
</svg>
